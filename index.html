        // ═══════════════════════ TOAST SYSTEM ═══════════════════════
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { info: 'ℹ️', success: '✅', warning: '⚠️' };
            toast.innerHTML = `<span>${icons[type] || ''}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ═══════════════════════ COPY PROTECTION ═══════════════════════
        document.addEventListener('selectstart', e => e.preventDefault());
        document.addEventListener('contextmenu', e => { e.preventDefault(); showToast('This content is protected by copyright', 'warning'); });
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            const blocked = [
                (e.ctrlKey || e.metaKey) && ['c', 'a', 'u', 's', 'p'].includes(e.key.toLowerCase()),
                e.key === 'PrintScreen', e.key === 'F12'
            ];
            if (blocked.some(Boolean)) { e.preventDefault(); showToast('This content is protected by copyright', 'warning'); }
        });
        document.addEventListener('copy', e => { e.preventDefault(); showToast('This content is protected by copyright', 'warning'); });

        // ═══════════════════════ BOOK READER CLASS ═══════════════════════
        class BookReader {
            constructor() {
                // State
                this.currentChapter = 0;
                this.currentPage = 0;
                this.totalPages = 1;
                this.readingMode = 'scroll';
                this.theme = localStorage.getItem('ebook_theme') || 'light';
                this.fontSize = localStorage.getItem('ebook_fontsize') || '18px';
                this.fontFamily = localStorage.getItem('ebook_fontfamily') || 'var(--font-serif)';
                this.bookmarks = JSON.parse(localStorage.getItem('ebook_bookmarks') || '[]');
                this.comments = JSON.parse(localStorage.getItem('ebook_comments') || '{}');
                this.lastPosition = JSON.parse(localStorage.getItem('ebook_lastpos') || 'null');

                // DOM refs
                this.els = {
                    sidebar: document.getElementById('sidebar'),
                    sidebarOverlay: document.getElementById('sidebarOverlay'),
                    main: document.getElementById('main'),
                    chapterList: document.getElementById('chapterList'),
                    topbarTitle: document.getElementById('topbarTitle'),
                    chapterHeader: document.getElementById('chapterHeader'),
                    chapterContent: document.getElementById('chapterContent'),
                    commentsSection: document.getElementById('commentsSection'),
                    readingArea: document.getElementById('readingArea'),
                    contentWrapper: document.getElementById('contentWrapper'),
                    pageControls: document.getElementById('pageControls'),
                    pageInfo: document.getElementById('pageInfo'),
                    chapterProgress: document.getElementById('chapterProgress'),
                    chapterPct: document.getElementById('chapterPct'),
                    overallProgress: document.getElementById('overallProgress'),
                    overallPct: document.getElementById('overallPct'),
                    settingsPanel: document.getElementById('settingsPanel'),
                    bookmarkPanel: document.getElementById('bookmarkPanel'),
                    bookmarkList: document.getElementById('bookmarkList'),
                    continueBanner: document.getElementById('continueBanner'),
                    watermark: document.getElementById('watermark'),
                    watermarkVisible: document.getElementById('watermarkVisible'),
                };

                this.init();
            }

            init() {
                this.applyTheme();
                this.applyFont();
                this.buildChapterList();
                this.bindEvents();
                this.showSkeleton();
                setTimeout(() => {
                    this.loadChapter(0);
                    this.checkContinueReading();
                    this.startAutoSave();
                }, 400);
            }

            // ── Theme ──
            applyTheme() {
                document.documentElement.setAttribute('data-theme', this.theme);
                document.getElementById('btnTheme').textContent = this.theme === 'dark' ? '☀️' : '🌙';
            }
            toggleTheme() {
                this.theme = this.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('ebook_theme', this.theme);
                this.applyTheme();
            }

            // ── Font ──
            applyFont() {
                document.body.style.fontSize = this.fontSize;
                document.body.style.fontFamily = this.fontFamily;
                if (this.readingMode === 'paginated') setTimeout(() => this.paginate(), 50);
            }

            // ── Chapter List ──
            buildChapterList() {
                this.els.chapterList.innerHTML = '';
                BOOK.chapters.forEach((ch, i) => {
                    const li = document.createElement('li');
                    li.className = 'chapter-item' + (i === this.currentChapter ? ' active' : '');
                    const commentCount = (this.comments[ch.id] || []).length;
                    li.innerHTML = `<button data-index="${i}"><span>📖</span><span>${ch.title}</span>${commentCount ? `<span class="chapter-badge">${commentCount}</span>` : ''}</button>`;
                    this.els.chapterList.appendChild(li);
                });
            }

            // ── Skeleton ──
            showSkeleton() {
                this.els.chapterHeader.innerHTML = '<div class="skeleton"><div class="skeleton-title"></div></div>';
                this.els.chapterContent.innerHTML = '<div class="skeleton">' + '<div class="skeleton-line"></div>'.repeat(12) + '</div>';
                this.els.commentsSection.innerHTML = '';
            }

            // ── Load Chapter ──
            loadChapter(index) {
                if (index < 0 || index >= BOOK.chapters.length) return;
                this.currentChapter = index;
                this.currentPage = 0;
                const ch = BOOK.chapters[index];
                this.els.topbarTitle.textContent = ch.title;
                this.els.chapterHeader.innerHTML = `<h1 class="chapter-title">${ch.title}</h1><p class="chapter-subtitle">By ${BOOK.author} · Chapter ${index + 1} of ${BOOK.chapters.length}</p>`;
                this.els.chapterContent.innerHTML = ch.content;
                this.els.chapterContent.style.animation = 'fadeIn .4s ease';
                this.renderComments();
                this.buildChapterList();
                this.els.watermarkVisible.textContent = `© ${BOOK.author}`;
                this.els.watermark.textContent = BOOK.author.toUpperCase();
                this.els.readingArea.scrollTop = 0;
                if (this.readingMode === 'paginated') {
                    setTimeout(() => this.paginate(), 50);
                } else {
                    this.els.pageControls.classList.add('hidden');
                    this.els.readingArea.classList.remove('paginated');
                    this.updateProgress();
                }
            }

            // ── Pagination ──
            paginate() {
                this.els.readingArea.classList.add('paginated');
                this.els.pageControls.classList.remove('hidden');
                const area = this.els.readingArea;
                const wrapper = this.els.contentWrapper;
                const viewH = area.clientHeight;
                const totalH = wrapper.scrollHeight;
                this.totalPages = Math.max(1, Math.ceil(totalH / viewH));
                this.showPage(this.currentPage);
            }

            showPage(page) {
                this.currentPage = Math.max(0, Math.min(page, this.totalPages - 1));
                const viewH = this.els.readingArea.clientHeight;
                this.els.contentWrapper.style.transform = `translateY(-${this.currentPage * viewH}px)`;
                this.els.pageInfo.textContent = `Page ${this.currentPage + 1} of ${this.totalPages}`;
                document.getElementById('btnPrev').disabled = this.currentPage === 0;
                document.getElementById('btnNext').disabled = this.currentPage >= this.totalPages - 1;
                this.updateProgress();
            }

            nextPage() {
                if (this.readingMode === 'paginated') {
                    if (this.currentPage < this.totalPages - 1) this.showPage(this.currentPage + 1);
                    else if (this.currentChapter < BOOK.chapters.length - 1) this.loadChapter(this.currentChapter + 1);
                }
            }

            prevPage() {
                if (this.readingMode === 'paginated') {
                    if (this.currentPage > 0) this.showPage(this.currentPage - 1);
                    else if (this.currentChapter > 0) { this.loadChapter(this.currentChapter - 1); setTimeout(() => { this.showPage(this.totalPages - 1); }, 100); }
                }
            }

            // ── Reading Mode ──
            setReadingMode(mode) {
                this.readingMode = mode;
                if (mode === 'scroll') {
                    this.els.readingArea.classList.remove('paginated');
                    this.els.pageControls.classList.add('hidden');
                    this.els.contentWrapper.style.transform = '';
                } else {
                    this.paginate();
                }
            }

            // ── Progress ──
            updateProgress() {
                let chPct = 0;
                if (this.readingMode === 'paginated') {
                    chPct = this.totalPages > 1 ? Math.round(((this.currentPage + 1) / this.totalPages) * 100) : 100;
                } else {
                    const area = this.els.readingArea;
                    chPct = area.scrollHeight > area.clientHeight ? Math.round((area.scrollTop / (area.scrollHeight - area.clientHeight)) * 100) : 100;
                }
                this.els.chapterProgress.style.width = chPct + '%';
                this.els.chapterPct.textContent = chPct + '%';
                const overallPct = Math.round(((this.currentChapter + (chPct / 100)) / BOOK.chapters.length) * 100);
                this.els.overallProgress.style.width = overallPct + '%';
                this.els.overallPct.textContent = overallPct + '%';
            }

            // ── Sidebar ──
            toggleSidebar() {
                const open = this.els.sidebar.classList.toggle('collapsed');
                this.els.sidebarOverlay.classList.toggle('active', !open);
                if (window.innerWidth > 1024) this.els.main.classList.toggle('shifted', !open);
            }
            closeSidebar() {
                this.els.sidebar.classList.add('collapsed');
                this.els.sidebarOverlay.classList.remove('active');
                this.els.main.classList.remove('shifted');
            }

            // ── Bookmarks ──
            addBookmark() {
                const ch = BOOK.chapters[this.currentChapter];
                const note = prompt('Add a note for this bookmark (optional):') || '';
                const bm = {
                    id: Date.now(), chapterIndex: this.currentChapter, chapterTitle: ch.title,
                    page: this.currentPage, mode: this.readingMode,
                    scrollTop: this.els.readingArea.scrollTop,
                    date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                    note: note
                };
                this.bookmarks.push(bm);
                this.saveBookmarks();
                showToast('Bookmark saved!', 'success');
            }

            deleteBookmark(id) {
                this.bookmarks = this.bookmarks.filter(b => b.id !== id);
                this.saveBookmarks();
                this.renderBookmarks();
                showToast('Bookmark removed', 'info');
            }

            jumpToBookmark(bm) {
                this.loadChapter(bm.chapterIndex);
                if (bm.mode === 'paginated') { setTimeout(() => this.showPage(bm.page), 100); }
                else { setTimeout(() => { this.els.readingArea.scrollTop = bm.scrollTop; }, 100); }
                this.els.bookmarkPanel.classList.remove('open');
            }

            saveBookmarks() { localStorage.setItem('ebook_bookmarks', JSON.stringify(this.bookmarks)); }

            renderBookmarks() {
                const list = this.els.bookmarkList;
                if (!this.bookmarks.length) { list.innerHTML = '<div class="bookmark-empty">📑 No bookmarks yet.<br>Click the bookmark button while reading to save your place.</div>'; return; }
                list.innerHTML = this.bookmarks.map(bm => `
      <div class="bookmark-item" data-id="${bm.id}">
        <button class="bm-delete" data-id="${bm.id}" title="Delete">✕</button>
        <div class="bm-chapter">${bm.chapterTitle}</div>
        <div class="bm-meta">Page ${bm.page + 1} · ${bm.date}</div>
        ${bm.note ? `<div class="bm-note">"${bm.note}"</div>` : ''}
      </div>`).join('');
            }

            // ── Auto-save Position ──
            savePosition() {
                const pos = { chapterIndex: this.currentChapter, page: this.currentPage, scrollTop: this.els.readingArea.scrollTop, mode: this.readingMode };
                localStorage.setItem('ebook_lastpos', JSON.stringify(pos));
            }
            startAutoSave() { setInterval(() => this.savePosition(), 30000); }

            checkContinueReading() {
                if (this.lastPosition && (this.lastPosition.chapterIndex > 0 || this.lastPosition.page > 0 || this.lastPosition.scrollTop > 0)) {
                    this.els.continueBanner.style.display = 'block';
                }
            }

            continueReading() {
                if (!this.lastPosition) return;
                this.loadChapter(this.lastPosition.chapterIndex);
                if (this.lastPosition.mode === 'paginated') { setTimeout(() => this.showPage(this.lastPosition.page), 100); }
                else { setTimeout(() => { this.els.readingArea.scrollTop = this.lastPosition.scrollTop; }, 100); }
                this.els.continueBanner.style.display = 'none';
                showToast('Welcome back! Resuming where you left off.', 'success');
            }

            // ── Comments ──
            renderComments() {
                const chId = BOOK.chapters[this.currentChapter].id;
                const chComments = this.comments[chId] || [];
                const topLevel = chComments.filter(c => !c.parentId);
                this.els.commentsSection.innerHTML = `
      <h3>💬 Comments (${chComments.length})</h3>
      <div class="comment-form" id="commentForm">
        <input type="text" id="commentName" placeholder="Your name" maxlength="50">
        <textarea id="commentText" placeholder="Share your thoughts on this chapter..." maxlength="1000"></textarea>
        <button class="btn-submit" id="commentSubmit">Post Comment</button>
      </div>
      <div id="commentsList">${topLevel.map(c => this.renderComment(c, chComments)).join('')}</div>`;
            }

            renderComment(comment, allComments) {
                const replies = allComments.filter(c => c.parentId === comment.id);
                return `<div class="comment-thread">
      <div class="comment" data-id="${comment.id}">
        <div class="c-header"><span class="c-author">${this.escHtml(comment.author)}</span><span class="c-date">${comment.date}</span></div>
        <div class="c-body">${this.escHtml(comment.text)}</div>
        <div class="c-actions">
          <button onclick="reader.showReplyForm('${comment.id}')">↩ Reply</button>
          <button onclick="reader.flagComment('${comment.id}')">🚩 Report</button>
        </div>
      </div>
      <div id="replyForm_${comment.id}"></div>
      ${replies.map(r => `<div class="comment-reply"><div class="comment" data-id="${r.id}">
        <div class="c-header"><span class="c-author">${this.escHtml(r.author)}</span><span class="c-date">${r.date}</span></div>
        <div class="c-body">${this.escHtml(r.text)}</div>
        <div class="c-actions"><button onclick="reader.flagComment('${r.id}')">🚩 Report</button></div>
      </div></div>`).join('')}
    </div>`;
            }

            addComment(author, text, parentId = null) {
                if (!author.trim() || !text.trim()) { showToast('Please fill in your name and comment.', 'warning'); return; }
                const chId = BOOK.chapters[this.currentChapter].id;
                if (!this.comments[chId]) this.comments[chId] = [];
                this.comments[chId].push({
                    id: 'c' + Date.now(), author: author.trim(), text: text.trim(), parentId,
                    date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }),
                    flagged: false
                });
                localStorage.setItem('ebook_comments', JSON.stringify(this.comments));
                this.renderComments();
                this.buildChapterList();
                showToast('Comment posted!', 'success');
            }

            showReplyForm(parentId) {
                const container = document.getElementById(`replyForm_${parentId}`);
                if (container.innerHTML) { container.innerHTML = ''; return; }
                container.innerHTML = `<div class="reply-form">
      <input type="text" id="replyName_${parentId}" placeholder="Your name" maxlength="50">
      <textarea id="replyText_${parentId}" placeholder="Write a reply..." maxlength="500"></textarea>
      <div class="reply-btns">
        <button class="btn-submit" onclick="reader.submitReply('${parentId}')">Reply</button>
        <button style="background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border)" onclick="document.getElementById('replyForm_${parentId}').innerHTML=''">Cancel</button>
      </div></div>`;
            }

            submitReply(parentId) {
                const name = document.getElementById(`replyName_${parentId}`).value;
                const text = document.getElementById(`replyText_${parentId}`).value;
                this.addComment(name, text, parentId);
            }

            flagComment(id) { showToast('Comment has been reported. Thank you.', 'info'); }
            escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

            // ── Share ──
            shareChapter() {
                const ch = BOOK.chapters[this.currentChapter];
                const url = window.location.href.split('#')[0] + '#' + ch.id;
                navigator.clipboard.writeText(url).then(() => showToast('Chapter link copied!', 'success'))
                    .catch(() => showToast('Could not copy link.', 'warning'));
            }

            // ── Swipe Support ──
            initSwipe() {
                let startX = 0, startY = 0;
                this.els.readingArea.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
                this.els.readingArea.addEventListener('touchend', e => {
                    const dx = e.changedTouches[0].clientX - startX;
                    const dy = e.changedTouches[0].clientY - startY;
                    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
                        if (dx < 0) this.nextPage(); else this.prevPage();
                    }
                }, { passive: true });
            }

            // ── Event Binding ──
            bindEvents() {
                // Sidebar
                document.getElementById('btnSidebar').addEventListener('click', () => this.toggleSidebar());
                document.getElementById('sidebarClose').addEventListener('click', () => this.closeSidebar());
                this.els.sidebarOverlay.addEventListener('click', () => this.closeSidebar());
                this.els.chapterList.addEventListener('click', e => {
                    const btn = e.target.closest('button[data-index]');
                    if (btn) { this.loadChapter(+btn.dataset.index); this.closeSidebar(); }
                });

                // Theme
                document.getElementById('btnTheme').addEventListener('click', () => this.toggleTheme());

                // Settings
                document.getElementById('btnSettings').addEventListener('click', () => {
                    this.els.settingsPanel.classList.toggle('open');
                    this.els.bookmarkPanel.classList.remove('open');
                });
                document.getElementById('fontSizeOpts').addEventListener('click', e => {
                    const btn = e.target.closest('button[data-size]');
                    if (!btn) return;
                    this.fontSize = btn.dataset.size;
                    localStorage.setItem('ebook_fontsize', this.fontSize);
                    document.querySelectorAll('#fontSizeOpts button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.applyFont();
                });
                document.getElementById('fontFamilyOpts').addEventListener('click', e => {
                    const btn = e.target.closest('button[data-font]');
                    if (!btn) return;
                    this.fontFamily = btn.dataset.font;
                    localStorage.setItem('ebook_fontfamily', this.fontFamily);
                    document.querySelectorAll('#fontFamilyOpts button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.applyFont();
                });
                document.getElementById('readingModeOpts').addEventListener('click', e => {
                    const btn = e.target.closest('button[data-mode]');
                    if (!btn) return;
                    document.querySelectorAll('#readingModeOpts button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.setReadingMode(btn.dataset.mode);
                });

                // Bookmarks
                document.getElementById('btnBookmark').addEventListener('click', () => this.addBookmark());
                document.getElementById('btnBookmarkPanel').addEventListener('click', () => {
                    this.els.bookmarkPanel.classList.toggle('open');
                    this.els.settingsPanel.classList.remove('open');
                    this.renderBookmarks();
                });
                document.getElementById('bookmarkPanelClose').addEventListener('click', () => this.els.bookmarkPanel.classList.remove('open'));
                this.els.bookmarkList.addEventListener('click', e => {
                    const delBtn = e.target.closest('.bm-delete');
                    if (delBtn) { this.deleteBookmark(+delBtn.dataset.id); return; }
                    const item = e.target.closest('.bookmark-item');
                    if (item) { const bm = this.bookmarks.find(b => b.id === +item.dataset.id); if (bm) this.jumpToBookmark(bm); }
                });

                // Page nav
                document.getElementById('btnPrev').addEventListener('click', () => this.prevPage());
                document.getElementById('btnNext').addEventListener('click', () => this.nextPage());

                // Keyboard nav
                document.addEventListener('keydown', e => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); this.nextPage(); }
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); this.prevPage(); }
                });

                // Share
                document.getElementById('btnShare').addEventListener('click', () => this.shareChapter());

                // Continue reading
                this.els.continueBanner.addEventListener('click', () => this.continueReading());

                // Comments delegation
                this.els.commentsSection.addEventListener('click', e => {
                    if (e.target.id === 'commentSubmit') {
                        const name = document.getElementById('commentName').value;
                        const text = document.getElementById('commentText').value;
                        this.addComment(name, text);
                    }
                });

                // Scroll progress
                this.els.readingArea.addEventListener('scroll', () => { if (this.readingMode === 'scroll') this.updateProgress(); });

                // Close panels on outside click
                document.addEventListener('click', e => {
                    if (this.els.settingsPanel.classList.contains('open') && !this.els.settingsPanel.contains(e.target) && e.target.id !== 'btnSettings') {
                        this.els.settingsPanel.classList.remove('open');
                    }
                });

                // Resize repaginate
                window.addEventListener('resize', () => { if (this.readingMode === 'paginated') this.paginate(); });

                // Swipe
                this.initSwipe();
            }
        }

        // ═══════════════════════ INITIALIZE ═══════════════════════
        const reader = new BookReader();
    </script>
</body>

</html>
